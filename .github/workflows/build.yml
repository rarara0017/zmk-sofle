name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

# Node.js 24への強制移行警告を消すための環境変数をグローバルに設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Firmware using Local Script
        run: |
          chmod +x ./build_local.sh
          RUNTIME=docker ./build_local.sh build

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eyelash_sofle_dongle_firmware
          # スクリプトのコピー機能に頼らず、buildフォルダから直接すべての .uf2 ファイルを回収する記述に変更
          path: build/**/*.uf2
