name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Firmware using Local Script
        run: |
          chmod +x ./build_local.sh
          RUNTIME=docker ./build_local.sh build

      # === 【検証ステップ】生成されたファイルを力技で探してログに出す ===
      - name: Debug Directory Structure
        run: |
          echo "=== 現在の全フォルダ構造をリストアップします ==="
          find . -maxdepth 4 -not -path '*/.*'
          
          echo "=== リポジトリ内に .uf2 または .bin ファイルが存在するか検索します ==="
          find . -name "*.uf2" -o -name "*.bin"

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eyelash_sofle_dongle_firmware
          # リポジトリ内のどこかにあれば、パスを問わずすべて回収する設定
          path: |
            **/*.uf2
            **/*.bin
