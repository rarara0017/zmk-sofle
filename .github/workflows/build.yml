name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: src

      - name: Initialize and Build All Firmwares
        run: |
          # 1. ツールチェーンと West の導入
          pip3 install west
          
          # 2. ZMK公式の標準的なワークスペース展開（マニフェストの階層を指定）
          # --manifest-path=app を追加して、正しい west.yml の位置を教えます
          west init -m https://github.com/zmkfirmware/zmk --mr main --manifest-path=app workspace
          cd workspace
          
          # あなたのリポジトリの config と boards をワークスペースに配置
          cp -r ../src/config .
          cp -r ../src/boards .
          
          # 依存モジュールのダウンロード
          west update
          
          # 3. 環境変数の固定
          export ZEPHYR_BASE=${GITHUB_WORKSPACE}/workspace/zephyr
          
          # 出力用フォルダの作成
          mkdir -p ../artifacts
          
          # 4. 各ファームウェアをビルド
          echo "=== Building Dongle ==="
          west build -p -b nice_nano_v2 -s app -- -DSHIELD=eyelash_sofle_central_dongle -DZMK_CONFIG="${GITHUB_WORKSPACE}/workspace/config"
          cp build/zephyr/zmk.uf2 ../artifacts/eyelash_sofle_dongle.uf2
          
          echo "=== Building Left Hand ==="
          west build -p -b nice_nano_v2 -s app -- -DSHIELD=eyelash_sofle_peripheral_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/workspace/config"
          cp build/zephyr/zmk.uf2 ../artifacts/eyelash_sofle_left.uf2
          
          echo "=== Building Right Hand ==="
          west build -p -b nice_nano_v2 -s app -- -DSHIELD=eyelash_sofle_peripheral_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/workspace/config"
          cp build/zephyr/zmk.uf2 ../artifacts/eyelash_sofle_right.uf2

      # 5. 成果物の回収
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eyelash_sofle_dongle_firmware
          path: artifacts/*
