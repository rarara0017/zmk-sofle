name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. あなたのリポジトリ（carlosedp/zmk-sofle）をチェックアウト
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. ZMK公式のビルド機能を直接ステップ内で実行（環境変数はすべて自動セットアップされます）
      - name: Build ZMK Firmware
        uses: zmkfirmware/zmk-actions/build-keyboard@v2
        with:
          # あなたのリポジトリ内の config フォルダを読み込ませる
          user_config_dir: 'config'
